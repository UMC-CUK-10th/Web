<!DOCTYPE html>
<html lang="ko">

<!-- 1주차 미션 -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 체크리스트</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <header>
            <h1>김햄찌의 체크리스트</h1>
            <p>이번 시간에 공부하는 내용을 추가해볼까요?</p>
        </header>
        <section>
            <div id="loading_indicator" class="loading_indicator">
                <span>🌻</span>
                <span>🌻</span>
                <span>🌻</span>
            </div>
        </section>
        <section>
            <input id="todo_input" type="text" placeholder="제목을 입력해주세요">
            <button>추가</button>
        </section>

        <section>
            <div class="container">
                <div class="left">
                    <h2 class="tag">Todo</h2>
                    <ul id="todo_container" class="todo_container">
                    </ul>
                </div>
                <div class="right">
                    <h2 class="tag">완료</h2>
                    <ul id="finish_container" class="finish_container">
                    </ul>
                </div>
            </div>
        </section>
    </main>
    <script src="dist/script.js"></script>
</body>

</html>
